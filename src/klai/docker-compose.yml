version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: klai_qdrant
    ports:
      - "6333:6333" # REST API (Used by Semantic Kernel)
      - "6334:6334" # gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  klai-bot:
    build: .
    container_name: klai-bot
    restart: unless-stopped
    depends_on:
      - qdrant
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./appsettings.json:/app/appsettings.json
    environment:
      # Override the Qdrant host to use the docker internal network
      - QDRANT_HOST=qdrant
      - SQLITE_CONNECTION_STRING=Data Source=/app/data/klai_memory.db